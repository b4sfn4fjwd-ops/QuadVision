<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#0B1120"/>
  <!-- x² tile (blue) -->
  <rect x="3" y="3" width="18" height="18" rx="3" fill="#1D4ED8" stroke="#3B82F6" stroke-width="1"/>
  <text x="12" y="16" font-family="monospace" font-weight="700" font-size="9" fill="#93C5FD" text-anchor="middle">x²</text>
  <!-- bx right (amber) -->
  <rect x="23" y="3" width="7" height="18" rx="2" fill="#92400E" stroke="#F59E0B" stroke-width="1"/>
  <!-- bx bottom (amber) -->
  <rect x="3" y="23" width="18" height="7" rx="2" fill="#92400E" stroke="#F59E0B" stroke-width="1"/>
  <!-- corner piece (purple) -->
  <rect x="23" y="23" width="7" height="7" rx="2" fill="#5B21B6" stroke="#8B5CF6" stroke-width="1"/>
  <!-- outer square border -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="4" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
</svg>
